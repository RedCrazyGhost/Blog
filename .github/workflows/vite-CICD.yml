# 构建 dist 并通过 GitHub Actions 部署到 Pages（需在仓库 Settings → Pages 选择 GitHub Actions 为发布源）
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

      - name: Verify build output
        run: |
          if grep -q 'src/main.ts' dist/index.html; then
            echo 'dist/index.html 仍引用源码入口，构建产物无效'
            exit 1
          fi
          test -f dist/index.html
          test -d dist/assets
          test -f dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
