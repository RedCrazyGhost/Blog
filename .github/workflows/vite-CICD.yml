# 构建 dist 并部署到 gh-pages 分支（GitHub Pages 需选择该分支为发布源）
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Bump version
        id: bump
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q 'chore: bump version'; then
            echo "version=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")" >> "$GITHUB_OUTPUT"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            NEW_VERSION="$(node scripts/bump-version.mjs)"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if grep -q 'src/main.ts' dist/index.html; then
            echo 'dist/index.html 仍引用源码入口，构建产物无效'
            exit 1
          fi
          test -f dist/index.html
          test -d dist/assets

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: blog.redcrazyghost.vip

      - name: Commit version bump
        if: steps.bump.outputs.skipped != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push
