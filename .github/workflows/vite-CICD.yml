# 构建 dist 并部署到 gh-pages 分支（GitHub Pages 需选择该分支为发布源）
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if grep -q 'src/main.ts' dist/index.html; then
            echo 'dist/index.html 仍引用源码入口，构建产物无效'
            exit 1
          fi
          test -f dist/index.html
          test -d dist/assets

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: blog.redcrazyghost.vip
