# 每日同步热力图数据到仓库（GitHub + 力扣 + Steam 近一年）
name: Sync heatmap data

on:
  schedule:
    # UTC 16:00 ≈ 北京时间次日 0:00
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch heatmap data
        run: node scripts/fetch-heatmap-data.mjs
        env:
          VITE_GITHUB_OWNER: RedCrazyGhost
          VITE_LEETCODE_USER_SLUG: redcrazyghost
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(heatmap): sync activity data"
          file_pattern: |
            public/data/activity-heatmap.json
            public/data/steam-playtime-snapshots.json
